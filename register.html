    <style>
/* ============================================
   PAGE CENTER
============================================ */
.auth-page {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 40px 0;
}

/* ============================================
   NEW REGISTER WRAPPER (Better Width Handling)
============================================ */
.register-wrapper {
    display: flex;
    justify-content: center;
    width: 100%;
    padding: 20px 0;
}

/* Main Register Card with perfect width */
.register-wrapper .auth-card {
    width: 2600px !important;        /* ⭐ Perfect width */
    max-width: 95%;
    padding: 35px 40px;
    border-radius: 15px;
    background: var(--bg-primary);
    box-shadow: 0 8px 25px rgba(0,0,0,0.12);
    border: 1px solid var(--border-color);
    margin: 0 auto;
}

/* Headings */
.auth-card h1 {
    font-size: 1.9rem;
    margin-bottom: 15px;
    font-weight: 700;
    background: var(--primary-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.auth-card h3 {
    font-size: 1.15rem;
    margin: 20px 0 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border-color);
    color: var(--text-primary);
}

/* FORM GRID */
.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    width: 100%;
}

.form-group {
    margin-bottom: 14px;
}

.form-group label {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 5px;
    display: block;
    color: var(--text-secondary);
}

/* INPUTS */
.form-group input,
.form-group select {
    width: 100%;
    padding: 9px 12px;
    height: 40px;
    font-size: 15px;
    border-radius: 6px;
    border: 1px solid var(--border-color);
    background: var(--bg-secondary);
    color: var(--text-primary);
    transition: 0.3s;
}

.form-group input:focus,
.form-group select:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--glass);
    outline: none;
}

/* Terms box */
.form-options {
    margin: 10px 0 15px;
}

/* BUTTON */
.btn.full-width {
    width: 100%;
    padding: 12px 0;
    font-size: 15px;
    border-radius: 10px;
    font-weight: 600;
    background: var(--primary-gradient) !important;
    color: white !important;
    transition: 0.3s;
}

.btn.full-width:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(39, 70, 255, 0.3);
}

/* Footer */
.auth-footer {
    margin-top: 18px;
    text-align: center;
    font-size: 14px;
}

.auth-footer a {
    color: var(--primary);
    font-weight: 600;
}

/* Responsive */
@media (max-width: 768px) {
    .register-wrapper .auth-card {
        width: 95% !important;
        padding: 20px;
    }

    .form-row {
        grid-template-columns: 1fr;
    }
}
    </style>
</head>

    <!-- REGISTER FORM -->
    <div class="auth-page">
        <div class="auth-container register-wrapper">
            <div class="auth-card">
                <h1>Create Account</h1>

                <form class="auth-form" id="registerForm">

                    <h3>Personal Information</h3>

                    <div class="form-row">
                        <div class="form-col">
                            <div class="form-group">
                                <label>Full Name</label>
                                <input type="text" id="name" required>
                            </div>

                            <div class="form-group">
                                <label>Age</label>
                                <input type="number" id="age" min="1" max="120" required>
                            </div>

                            <div class="form-group">
                                <label>Phone Number</label>
                                <input type="text" id="phone" maxlength="15" required>
                            </div>
                        </div>

                        <div class="form-col">
                            <div class="form-group">
                                <label>Gender</label>
                                <select id="gender" required>
                                    <option value="">Select Gender</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label>Family History of Alzheimer's</label>
                                <select id="family_history" required>
                                    <option value="">Select Option</option>
                                    <option value="Yes">Yes</option>
                                    <option value="No">No</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label>Existing Conditions</label>
                                <input type="text" id="conditions" placeholder="Diabetes, BP, etc.">
                            </div>
                        </div>
                    </div>

                    <h3>Health Information</h3>

                    <div class="form-row">
                        <div class="form-col">
                            <div class="form-group">
                                <label>Height (cm)</label>
                                <input type="number" id="height" required>
                            </div>
                        </div>

                        <div class="form-col">
                            <div class="form-group">
                                <label>Weight (kg)</label>
                                <input type="number" id="weight" required>
                            </div>
                        </div>
                    </div>

                    <h3>Account Login</h3>

                    <div class="form-row">
                        <div class="form-col">
                            <div class="form-group">
                                <label>Email Address</label>
                                <input type="email" id="email" required>
                            </div>
                        </div>

                        <div class="form-col">
                            <div class="form-group">
                                <label>Password</label>
                                <input type="password" id="password" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-col">
                            <div class="form-group">
                                <label>Confirm Password</label>
                                <input type="password" id="confirm" required>
                            </div>
                        </div>
                        <div class="form-col"></div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox">
                            <input type="checkbox" required>
                            I agree to the Terms of Service
                        </label>
                    </div>

                    <button type="submit" class="btn full-width">Create Account</button>
                </form>

                <p class="auth-footer" style="font-size: 15px;">
                    Already have an account?
                    <a href="login.html">Login</a>
                </p>
            </div>
        </div>
    </div>

    <!-- JS -->
    <script>
document.getElementById("registerForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = {
        name: document.getElementById("name").value,
        age: document.getElementById("age").value,
        gender: document.getElementById("gender").value,
        phone: document.getElementById("phone").value,
        height: document.getElementById("height").value,
        weight: document.getElementById("weight").value,
        conditions: document.getElementById("conditions").value,
        family_history: document.getElementById("family_history").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

    const confirm = document.getElementById("confirm").value;

    if (data.password !== confirm) {
        alert("Passwords do not match!");
        return;
    }

    const response = await fetch("http://localhost:5000/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });

    const result = await response.json();

    if (result.message === "User registered successfully!") {
        alert("Account Created!");
        window.location.href = "login.html";
    } else {
        alert(result.message);
    }
});
    </script>
