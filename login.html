<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NeuroVytis</title>
    <link rel="stylesheet" href="styles.css">

    <style>
/* Center container */
.auth-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.auth-card {
    width: 800px;
    padding: 35px 40px;
    border-radius: 14px;
    background: #ffffff;
    box-shadow: 0 4px 25px rgba(0,0,0,0.12);
}

/* Inputs */
.form-group input {
    padding: 12px 14px;
    font-size: 15px;
    border: 1px solid #ccc;
    border-radius: 6px;
}

.btn.full-width {
    padding: 12px 0;
    font-size: 16px;
    border-radius: 8px;
}

.auth-footer {
    text-align: center;
    margin-top: 15px;
    font-size: 0.95rem;
}

.auth-footer a {
    color: var(--primary);
    font-weight: 600;
}
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-container">

            <div class="nav-logo">
                <img src="images/logo.png" alt="NeuroVytis Logo" class="nav-logo-img">
                <span class="logo-text" style=" font-size: 2.1rem;">NeuroVytis</span>
            </div>

            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
                <li><a href="brain-visualizer.html" class="nav-link">Brain Visualizer</a></li>
                <li><a href="analytics.html" class="nav-link">Analytics</a></li>
                <li><a href="resources.html" class="nav-link">Resources</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>

                <a href="login.html" class="btn-login" style="
                    background: linear-gradient(90deg, #00C2FF, #2E4BFF, #7A1FFF);
                    color: white;
                    padding: 0.45rem 1.35rem;
                    border-radius: 2rem;
                    font-size: 0.95rem;
                    font-weight: 600;
                    display: inline-flex;
                    align-items: center;
                    justify-content: center;
                    height: 32px;
                    text-decoration: none;
                    box-shadow: 0 3px 10px rgba(39, 70, 255, 0.3);">
                    Login
                </a>
            </ul>
        </div>
    </nav>


    <!-- LOGIN -->
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">

                <h1 style="font-size: 1.9rem; margin-bottom: 15px; font-weight: 700;
                    background: var(--primary-gradient);
                    -webkit-background-clip: text;
                    -webkit-text-fill-color: transparent;">Welcome Back</h1>

                <form class="auth-form" id="loginForm">
                    
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" required>
                    </div>

                    <button type="submit" class="btn btn-primary full-width">
                        Sign In
                    </button>
                </form>

                <p class="auth-footer">
                    Don't have an account?
                    <a href="register.html">Sign Up</a>
                </p>
            </div>
        </div>
    </div>


<!-- ⭐ FINAL LOGIN SCRIPT CONNECTED TO BACKEND -->
<script>
document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    // Send data to backend
    const response = await fetch("http://localhost:5000/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
    });

    const result = await response.json();

    // SUCCESS → Go to dashboard
    if (result.success) {
        alert("Login Successful!");
        window.location.href = "profile.html";
    }

    // FAILED → Go to register
    else {
        alert("Invalid Email or Password!\nRedirecting to Register...");
        window.location.href = "register.html";
    }
});
</script>

</body>
</html>
